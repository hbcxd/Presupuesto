<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Fondo redondeado con el color de la barra superior -->
  <rect width="512" height="512" rx="110" fill="#0f172a"/>
  
  <!-- Gráfico Estadístico / Crecimiento Financiero -->
  <g transform="translate(64, 64)">
    <!-- Barra Izquierda (Ingresos - Verde) -->
    <rect x="64" y="200" width="60" height="144" rx="15" fill="#10b981"/>
    <!-- Barra Central (Progreso - Azul brillante) -->
    <rect x="164" y="110" width="60" height="234" rx="15" fill="#2563eb"/>
    <!-- Barra Derecha (Metas / Futuro - Blanco) -->
    <rect x="264" y="50" width="60" height="294" rx="15" fill="#f8fafc"/>
    
    <!-- Línea de tendencia hacia arriba -->
    <path d="M 64 220 L 194 130 L 324 70" fill="none" stroke="#10b981" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="324,54 340,78 312,78" fill="#10b981"/>
  </g>
</svg>
